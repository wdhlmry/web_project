<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - MySocial</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="login-page">

    <!-- Navbar -->
    <nav class="navbar">
        <h1>MySocial</h1>
    </nav>

    <!-- Main -->
    <main class="login-main">
        <div class="login-container">

            <div class="login-left">
                <h1>Goodbye 👋</h1>
                <p>You have been successfully logged out.<br>
                See you again soon!</p>
            </div>

            <div class="login-card">
                <h2>Logged Out</h2>
                <p class="subtitle">Want to come back?</p>

                <button class="login-btn" onclick="goLogin()">Login Again</button>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 MySocial</p>
    </footer>

    <script>
        function goLogin() {
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
