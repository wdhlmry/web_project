<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="profile_body">
    <aside class="profile_aside">
      <img src="/images/zedge.jpg" width="200" height="100%" />
    </aside>

    <main class="profile_main">
      <header class="profile_header">
        <a href=""><button>&larr;</button></a>
        <h2 class="username">@username</h2>
        <button>&plus;</button>
      </header>

      <div class="profile_info">
        <img
          class="profile_pic"
          src="/images/pngtree-avatar-icon-profile-icon-member-login-vector-isolated-png-image_5247852-removebg-preview.png"
          width="200px"
          height="200px"
        />
        <h3 class="nickname">Nickname</h3>
        <p class="bio">Bio</p>
        <ul class="info_list">
          <li><span id="followers_count">0</span> Followers</li>
          <li><span id="following_count">0</span> Following</li>
          <li><span id="posts_count">0</span> Posts</li>
        </ul>
        <button id="follow_button">Follow</button>
        <ul class="settings_list">
          <li><a href="editProfile.html">Edit Profile</a></li>
        </ul>
      </div>

      <div class="posts">
        <h3>Posts</h3>
        <h4>No Photos or Videos Uploaded</h4>
      </div>
    </main>
    <script src="profile.js"></script>
  </body>
</html>
