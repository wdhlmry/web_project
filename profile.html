<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="profile_body">
    <aside class="profile_aside">
      <img src="/project/zedge.jpg" width="200" height="100%" />
    </aside>

    <main class="profile_main">
      <header class="profile_header">
        <a href=""><button>&larr;</button></a>
        <h2>@username</h2>
        <button>&plus;</button>
      </header>

      <div class="profile_info">
        <img
          src="/project/pngtree-avatar-icon-profile-icon-member-login-vector-isolated-png-image_5247852-removebg-preview.png"
          width="200px"
          height="200px"
        />
        <h3>Nickname</h3>
        <p>Bio</p>
        <ul class="info_list">
          <li>0 Followers</li>
          <li>0 Following</li>
          <li>0 Posts</li>
        </ul>
        <ul class="settings_list">
          <li><a href="editProfile.html">Edit Profile</a></li>
        </ul>
      </div>

      <div class="posts">
        <h3>Posts</h3>
        <h4>No Photos or Videos Uploaded</h4>
      </div>
    </main>
  </body>
</html>
