<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body class="profile_body">
    <main class="profile_main">
      <header class="profile_header">
        <a href="../html/index.html"><button>&larr;</button></a>
        <h2 class="username">@username</h2>
      </header>

      <div class="profile_info">
        <img class="profile_pic" src="../images/default-avatar.png"/>
        <h3 class="nickname">Nickname</h3>
        <p class="bio">Bio</p>
        <ul class="info_list">
          <li><span id="followers_count">0</span> Followers</li>
          <li><span id="following_count">0</span> Following</li>
          <li><span id="posts_count">0</span> Posts</li>
        </ul>
        <!-- <button id="follow_button">Follow</button>  the user cannot follow himself-->
        <ul class="settings_list">
          <li><a href="editProfile.html">Edit Profile</a></li>
        </ul>
      </div>

      <div class="posts">
        <h3>Posts</h3>
        <div id="profile_posts"></div>
      </div>
    </main>
    <footer class="footer">
      <p>© 2026 MySocial. All rights reserved.</p>
    </footer>
    <script src="../javascript/profile.js"></script>
  </body>
</html>
