<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../css/styles.css">
     


</head>

<body class ="register-page">
    <main class="register-main">
        <section class="register-container">
            <div class="register-left">
                <h1>Join Us!</h1>
                <p>Create your account and let’s get started</p>
            </div>

            <div class="register-card">
                <h2>Registration</h2>
                <p class="subtitle">Please fill in your details to create your account.</p>
            

                <form action="#"class="register-form">

                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" name="email" id="register-email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="register-username">Username</label>
                        <input type="text" name="username" id="register-username" placeholder="Enter your username" required>
                    </div>

                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input type="password" name="password" id="register-password" placeholder="Enter your password"
                        pattern="(?=.*[A-Z])(?=.*[a-z]).{6,}" title="Password must be at least 6 charecters and includ both uppercase and lowercase letters "
                        required>
                    </div>
                    
                    <div class="form-options">
                        <label class="checkbox-label">
                        <input type="checkbox" id="showPassword" />
                            Show Password
                        </label>
                    </div>
                    <button type="submit" class="register-btn">Register</button>
                </form> 
            
                
                <p class="login-text">
                    Have an account? <a href="../html/login.html">Login here</a>
                </p>
            </div>
        </section>
    </main>
        <script>


    </script>

    
    <script src="../javascript/register.js"></script>
</body>
</html>
